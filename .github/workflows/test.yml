name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  docker-migration-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6.0.2

      - name: Create .env file
        run: |
          cat > tracker/.env << EOF
          DEBUG=True
          LOCAL=False
          DJANGO_SECRET_KEY=test-secret-key-for-ci
          DATABASE_URL=postgres://tracker:tracker@postgres:5432/tracker
          POSTGRES_DB=tracker
          POSTGRES_USER=tracker
          POSTGRES_PASSWORD=tracker
          CELERY_BROKER_URL=redis://redis:6379/0
          EOF

      - name: Start Docker services and run migrations
        run: |
          docker compose up -d postgres
          echo "Waiting for postgres to be healthy..."
          timeout 60 bash -c 'until docker compose exec -T postgres pg_isready -U tracker -d tracker; do sleep 2; done'
          echo "Starting Django service..."
          docker compose up -d django
          echo "Waiting for Django to start and run migrations..."
          sleep 10
          # Wait for migrations to complete by checking logs
          for i in {1..30}; do
            if docker compose logs django | grep -q "Starting development server"; then
              echo "Django server started successfully!"
              break
            fi
            if docker compose logs django | grep -qi "error\|exception\|failed"; then
              echo "Error detected in Django logs!"
              docker compose logs django
              exit 1
            fi
            echo "Waiting... (attempt $i/30)"
            sleep 5
          done
          echo "Final Django logs:"
          docker compose logs django

      - name: Verify migrations succeeded
        run: |
          if docker compose logs django | grep -q "Error\|Exception\|FAILED"; then
            echo "Migration errors detected!"
            docker compose logs django
            exit 1
          fi
          echo "Migrations completed successfully!"

      - name: Clean up Docker services
        if: always()
        run: |
          docker compose down -v

  test:
    needs: docker-migration-test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out code
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip uv setuptools genbadge[coverage]
          uv venv
          source .venv/bin/activate
          uv sync --dev

      - name: Run tests
        run: |
          source .venv/bin/activate
          cp .env.sample tracker/.env
          uv run pytest -c ./pytest.ini ./tracker/. --cov --cov-config=./.coveragerc --cov-report term --cov-report=html --cov-report=json --cov-report=xml

      - name: Generate coverage badge
        run: |
          source .venv/bin/activate
          genbadge coverage -i doc/coverage/coverage.xml -o doc/coverage/coverage.svg

      - name: Copy pages index to coverage dir
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: cp index.html doc/coverage/index.html

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./doc/coverage
          publish_branch: coverage
          force_orphan: true
