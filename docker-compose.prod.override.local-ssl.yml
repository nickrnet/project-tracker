# Local development override with self-signed certificates
# This allows testing the nginx proxy setup without Let's Encrypt
#
# Usage:
#  1. Generate self-signed certs:
#     mkdir -p secrets
#     openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#       -keyout secrets/local-privkey.pem \
#       -out secrets/local-fullchain.pem \
#       -subj "/CN=localhost"
#
#  2. Run:
#     docker-compose -f docker-compose.prod.yml -f docker-compose.prod.override.local-ssl.yml --env-file .env.prod up -d
#
#  3. Access https://localhost (accept self-signed cert warning in browser)

services:
  # Disable the simple nginx from base prod file
  nginx:
    profiles:
      - disabled

  # Simple nginx with self-signed certificates
  nginx-local:
    image: nginx:1.25
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      web:
        condition: service_healthy
    volumes:
      - ./docker/nginx/prod-ssl.conf:/etc/nginx/conf.d/default.conf:ro
      - ./secrets/local-fullchain.pem:/etc/ssl/certs/fullchain.pem:ro
      - ./secrets/local-privkey.pem:/etc/ssl/private/privkey.pem:ro
      - static_data:/var/www/static:ro
      - media_data:/var/www/media:ro
    environment:
      NGINX_HOST: localhost
