# Production-ready compose skeleton for local/VM/container deployments.
# - No bind mounts (no `./:/app`).
# - Uses named volumes for DB and any persistent file storage.
# - Uses Docker secrets for sensitive values (SECRET_KEY, Postgres password).
# - Expects an `.env.prod` (or environment) to provide non-sensitive config like
#   `DATABASE_URL` and other runtime flags. Secrets referenced below point to
#   files under `./secrets/` (this repo does not commit those files).

services:
  redis:
    image: redis:7
    restart: unless-stopped
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tracker}
      POSTGRES_USER: ${POSTGRES_USER:-tracker}
      # Use Docker secret file for password; this places the password at
      # `/run/secrets/postgres_password` inside the container.
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tracker} -d ${POSTGRES_DB:-tracker}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: project-tracker:web
    command: >
      sh -c "/app/ensure-db.sh && uv run python manage.py migrate --noinput && uv run python manage.py collectstatic --noinput && uv run gunicorn tracker.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    working_dir: /app/tracker
    env_file: .env.prod
    environment:
      # Use secret file for SECRET_KEY in the container if desired
      SECRET_KEY_FILE: /run/secrets/secret_key
      # Ensure Django uses the production settings module by default
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-tracker.settings.production}
      # Prefer a full DATABASE_URL provided from `.env.prod`.
      DATABASE_URL: ${DATABASE_URL}
      POSTGRES_DB: ${POSTGRES_DB:-tracker}
      POSTGRES_USER: ${POSTGRES_USER:-tracker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    secrets:
      - secret_key
    # Web no longer maps port 8000 to the host; NGINX will handle ingress.
    # Mount the static_data volume RW so the web container can `collectstatic` into it.
    volumes:
      - static_data:/app/staticfiles
      - media_data:/app/media
      - ./docker/django/ensure-db.sh:/app/ensure-db.sh:ro
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/ht/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  worker:
    build: .
    image: project-tracker:worker
    command: >
      sh -c "uv run celery -A tracker.celery worker -l info"
    working_dir: /app/tracker
    env_file: .env.prod
    environment:
      # Ensure Django uses the production settings module by default
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-tracker.settings.production}
      # Prefer a full DATABASE_URL provided from `.env.prod`.
      DATABASE_URL: ${DATABASE_URL}
      # Celery broker (override in .env.prod if needed)
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      POSTGRES_DB: ${POSTGRES_DB:-tracker}
      POSTGRES_USER: ${POSTGRES_USER:-tracker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    secrets:
      - secret_key
    volumes:
      - ./docker/django/ensure-db.sh:/app/ensure-db.sh:ro
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
      web:
        condition: service_healthy
    restart: unless-stopped

  beat:
    build: .
    image: project-tracker:beat
    command: >
      sh -c "uv run celery -A tracker.celery beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler"
    working_dir: /app/tracker
    env_file: .env.prod
    environment:
      # Ensure Django uses the production settings module by default
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-tracker.settings.production}
      # Prefer a full DATABASE_URL provided from `.env.prod`.
      DATABASE_URL: ${DATABASE_URL}
      # Celery broker (override in .env.prod if needed)
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      POSTGRES_DB: ${POSTGRES_DB:-tracker}
      POSTGRES_USER: ${POSTGRES_USER:-tracker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    secrets:
      - secret_key
    volumes:
      - ./docker/django/ensure-db.sh:/app/ensure-db.sh:ro
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
      web:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:1.25
    restart: unless-stopped
    ports:
      - "8001:80"
    depends_on:
      - web
    volumes:
      # NGINX config
      - ./docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      # Static files served from this named volume (read-only)
      - static_data:/var/www/static:ro
    environment:
      # placeholder for any runtime env vars
      NGINX_HOST: ${NGINX_HOST:-localhost}

volumes:
  redis_data:
  postgres_data:
  static_data:
  media_data:

secrets:
  # Files on the host that contain the secret values. Create these locally
  # and keep them out of version control (add `secrets/` to .gitignore).
  postgres_password:
    file: ./secrets/postgres_password
  secret_key:
    file: ./secrets/secret_key

# Usage notes:
# - Create a `.env.prod` file with non-sensitive values (or supply them via
#   the environment/CI). Example minimal entries:
#     DATABASE_URL=postgres://tracker:supersecret@postgres:5432/tracker
#     POSTGRES_DB=tracker
#     POSTGRES_USER=tracker
#
# - Place secret values in `./secrets/postgres_password` and
#   `./secrets/secret_key` (files only). Example:
#     mkdir -p secrets
#     printf '%s' "supersecret_pg_password" > secrets/postgres_password
#     printf '%s' "django-secret-key-value" > secrets/secret_key
#     chmod 600 secrets/*
#
# - Bring up with:
#     docker-compose -f docker-compose.prod.yml up --build -d
#
# - This file is a starting point. For production consider using built images
#   pushed to a registry, running behind a reverse-proxy/load-balancer, and
#   using an external managed database or K8s manifests.
